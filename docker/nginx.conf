# Reference edge-proxy config: terminates TLS, fronts /api/ → backend:8000
# and / → frontend:80. Use only when you don't want the frontend image to
# proxy the API itself.
upstream dropout_backend {
  server backend:8000;
}
upstream dropout_frontend {
  server frontend:80;
}

server {
  listen       80 default_server;
  server_name  _;

  client_max_body_size 16m;

  add_header X-Frame-Options          "DENY"           always;
  add_header X-Content-Type-Options   "nosniff"        always;
  add_header Referrer-Policy          "no-referrer"    always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location /api/ {
    proxy_pass         http://dropout_backend/api/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering    off;
    proxy_read_timeout 300;
  }

  location / {
    proxy_pass         http://dropout_frontend/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
  }
}
